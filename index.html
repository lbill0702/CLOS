<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HK Data Detective</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#1a1a2e}
html,body{height:100%;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh;padding:10px;color:#1a2a3a;background:#1a1a2e;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
.game-wrap{max-width:660px;margin:0 auto;position:relative}
.screen{min-height:100vh}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-size:17px;font-weight:900;color:#ffd700;letter-spacing:-0.3px;line-height:1.1}
.logo small{display:block;font-size:10px;color:#a0c4ff;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.score-badge{background:rgba(255,215,0,.12);border:2px solid rgba(255,215,0,.5);border-radius:20px;padding:4px 12px;color:#ffd700;font-size:13px;font-weight:800}
.diff-badge{padding:3px 8px;border-radius:10px;font-size:9px;font-weight:900;color:#fff;letter-spacing:.5px;text-transform:uppercase}

/* ── Progress ── */
.prog-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.prog-bar-bg{flex:1;background:rgba(255,255,255,.08);border-radius:20px;height:10px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
.prog-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#ff3030,#ff6060,#ffaa00);transition:width .7s}
.prog-label{font-size:10px;color:rgba(255,255,255,.5);font-weight:700;white-space:nowrap}

/* ── Map ── */
.map-card{background:#16213e;border-radius:20px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.5);margin-bottom:10px}
.map-title{font-size:16px;font-weight:900;color:#ffd700;margin-bottom:2px}
.map-sub{font-size:11px;color:#a0c4ff;margin-bottom:12px}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.zone-card{border-radius:16px;padding:12px;border:2.5px solid;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden;user-select:none;-webkit-user-select:none}
.zone-card:active{transform:scale(.97)}
.zone-card-pk{position:absolute;right:4px;bottom:-4px;font-size:52px;opacity:.3;line-height:1;pointer-events:none}
.zone-card-title{font-size:13px;font-weight:900;line-height:1.2;margin-bottom:2px}
.zone-card-sub{font-size:10px;font-weight:700;opacity:.7}
.zone-card-prog{font-size:9px;font-weight:800;margin-top:5px}
.zone-here{position:absolute;top:7px;right:7px;background:rgba(255,255,255,.9);border-radius:8px;padding:2px 7px;font-size:9px;font-weight:900}
.map-scroll{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.map-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;min-width:460px}
.map-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;cursor:pointer;margin:0 auto;border:2px solid transparent}
.map-dot:active{transform:scale(1.15)}
.map-dot.done{opacity:.8}
.map-dot.current{animation:pulse 1.2s ease infinite;will-change:box-shadow;transform:translateZ(0)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px #1a1a2e,0 0 0 5px #ffd700}50%{box-shadow:0 0 0 3px #1a1a2e,0 0 0 7px rgba(255,215,0,.4)}}
.map-dot.free{opacity:.4;border-style:dashed;border-color:rgba(255,255,255,.25);background:transparent !important;color:#555 !important}
.section-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;color:#a0c4ff;margin-bottom:6px;margin-top:14px}
.badge-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.badge-item{padding:6px 8px;border-radius:10px;font-size:11px;font-weight:800;border:2px solid}

/* ── Battle ── */
.battle-card{border-radius:20px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.55);position:relative}
.flash-overlay{position:absolute;inset:0;pointer-events:none;z-index:20;border-radius:20px;opacity:0;will-change:opacity;transform:translateZ(0)}
.flash-green{animation:fgreen .45s ease forwards}
.flash-red{animation:fred .4s ease forwards}
@keyframes fgreen{0%{opacity:0;background:#22dd66}15%{opacity:.35}100%{opacity:0}}
@keyframes fred{0%{opacity:0;background:#ff4444}15%{opacity:.28}100%{opacity:0}}
.pk-lid{background:linear-gradient(135deg,#cc1100,#ee3300,#cc1100);padding:10px 14px 8px;display:flex;align-items:center;gap:10px}
.pk-light-main{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#aaeeff,#44bbff);border:3px solid #fff;box-shadow:0 0 10px #66ccff;animation:lblink 3s ease infinite;will-change:box-shadow;transform:translateZ(0)}
@keyframes lblink{0%,90%,100%{box-shadow:0 0 10px #66ccff}95%{box-shadow:0 0 4px #66ccff}}
.pk-lights-sm{display:flex;gap:5px;margin-left:6px}
.pk-light-sm{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5)}
.pk-lid-title{margin-left:auto;color:rgba(255,255,255,.85);font-size:11px;font-weight:800}

/* Battle scene */
.battle-scene{position:relative;height:170px;overflow:hidden;background:linear-gradient(180deg,#2c4a6e 0%,#1a3050 40%,#2a5a30 40%,#1e4020 65%,#8B7355 65%,#6B5335 80%,#4a3520 80%);transform:translateZ(0)}
.plat-e{position:absolute;bottom:62px;right:20px;width:110px;height:18px;background:radial-gradient(ellipse,#4a8a35 60%,transparent 100%);border-radius:50%;opacity:.8}
.plat-p{position:absolute;bottom:14px;left:15px;width:110px;height:20px;background:radial-gradient(ellipse,#5a9a45 60%,transparent 100%);border-radius:50%;opacity:.8}

/* Sprites */
.sprite-e{position:absolute;right:28px;bottom:72px;font-size:60px;line-height:1;transform-origin:center bottom;will-change:transform}
.sprite-p{position:absolute;left:22px;bottom:26px;font-size:52px;line-height:1;transform-origin:center bottom;will-change:transform}
.sprite-e.idle,.sprite-e:not([class*=" "]){animation:ebob 2s ease-in-out infinite}
.sprite-p:not(.attack):not(.flinch){animation:pidle 1.8s ease-in-out infinite}
.sprite-e.hit{animation:ehit .5s ease}
.sprite-e.faint{animation:efaint .6s ease forwards}
.sprite-p.attack{animation:pattack .5s ease}
.sprite-p.flinch{animation:pflinch .4s ease}
@keyframes ebob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes ehit{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px) scale(.9)}50%{transform:translateX(8px)}80%{opacity:.4}90%{opacity:1}}
@keyframes efaint{0%{transform:scale(1);opacity:1}100%{transform:scale(.3) translateY(30px);opacity:0}}
@keyframes pidle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pattack{0%{transform:translateX(0)}30%{transform:translateX(40px) scale(1.1)}60%{transform:translateX(-5px)}100%{transform:translateX(0)}}
@keyframes pflinch{0%,100%{transform:translateX(0)}30%{transform:translateX(-10px) rotate(-5deg)}60%{transform:translateX(5px) rotate(3deg)}}

/* HUDs */
.enemy-hud{position:absolute;top:10px;left:10px;background:rgba(20,30,50,.88);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:6px 10px;min-width:140px}
.player-hud{position:absolute;bottom:10px;right:10px;background:rgba(20,30,50,.88);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:6px 10px;min-width:150px}
.hud-name{font-size:11px;font-weight:900;color:#fff}
.hud-lv{font-size:9px;color:#a0c4ff;font-weight:700;margin-bottom:4px}
.hud-bar-bg{background:rgba(255,255,255,.1);border-radius:4px;height:6px;overflow:hidden;margin-bottom:2px}
.hud-bar{height:100%;border-radius:4px;transition:width .6s}
.hud-hp-txt{font-size:9px;color:rgba(255,255,255,.5);font-weight:700}
.hud-type{display:inline-block;padding:1px 6px;border-radius:8px;font-size:8px;font-weight:900;color:#fff;margin-top:2px;text-transform:uppercase}

/* Question */
.qpanel{background:#fff;border-left:5px solid #cc2200;padding:12px 14px}
.qtext{font-size:15px;font-weight:700;color:#1a2a3a;line-height:1.45}
.viz-wrap{background:#f7fafd;border-top:1px solid #e0eaf4}

/* Dialogue */
.dialogue-box{background:linear-gradient(135deg,#f0f0e8,#e8e8d8);border:3px solid #333;border-radius:0 0 4px 4px;padding:10px 14px 8px;min-height:44px}
.dialogue-txt{font-size:13px;font-weight:700;color:#1a1a1a;line-height:1.4;min-height:20px}
.dialogue-cur{display:inline-block;animation:blink .6s step-end infinite;margin-left:2px;color:#333}
@keyframes blink{50%{opacity:0}}

/* Move box */
.move-box{background:linear-gradient(135deg,#e8e8d8,#d8d8c8);border:3px solid #333;border-top:none;border-radius:0 0 12px 12px;padding:8px 10px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.move-btn{padding:8px 6px;border-radius:8px;border:2.5px solid #ccc;background:#fff;font-family:inherit;font-size:13px;font-weight:800;color:#1a2a3a;cursor:pointer;text-align:center;line-height:1.2;-webkit-appearance:none}
.move-btn:active:not(:disabled){transform:scale(.97)}
.move-btn.correct{background:linear-gradient(135deg,#c8ffdc,#a0f0c0);border-color:#22c065;color:#0a5c2a;animation:mcorrect .4s ease}
.move-btn.wrong{background:linear-gradient(135deg,#ffd0d0,#ffb0b0);border-color:#e05555;color:#7a1111;animation:mwrong .3s ease}
.move-btn:disabled{cursor:not-allowed;opacity:.7}
.move-type{font-size:8px;display:block;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
@keyframes mcorrect{0%{transform:scale(.95)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes mwrong{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Feedback */
.feedback-area{padding:6px 10px}
.fb{text-align:center;padding:7px 10px;border-radius:8px;font-size:12px;font-weight:800}
.fb.ok{background:#c8ffd8;color:#0a5c2a;border:2px solid #22c065}
.fb.no{background:#ffd0d0;color:#7a1111;border:2px solid #e05555}
.hint-box{font-size:11px;color:#cc6600;font-weight:700;margin-top:5px;padding:5px 10px;background:#fff8e8;border-radius:7px;border:1.5px solid #ffcc80}

/* Actions */
.action-area{padding:8px 10px 14px;display:flex;gap:8px}
.next-btn{flex:1;padding:11px;border-radius:10px;border:none;font-family:inherit;font-size:14px;font-weight:900;color:#fff;cursor:pointer;background:linear-gradient(135deg,#cc2200,#ff4400);-webkit-appearance:none}
.next-btn:active{transform:scale(.97)}
.back-btn{padding:11px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.2);background:transparent;font-family:inherit;font-size:11px;font-weight:700;color:#888;cursor:pointer;-webkit-appearance:none}

/* ── Teaching Panel ── */
.teach-panel{background:#fffdf0;border:3px solid #e0a020;border-radius:14px;margin:10px 10px 0;overflow:hidden}
.teach-hdr{background:linear-gradient(135deg,#e0a020,#c87a00);padding:8px 14px;display:flex;align-items:center;gap:10px}
.teach-hdr-text{font-size:13px;font-weight:900;color:#fff}
.teach-hdr-sub{font-size:9px;color:rgba(255,255,255,.85);font-weight:700;margin-top:1px;text-transform:uppercase}
.teach-body{padding:12px 14px;display:flex;gap:12px;align-items:flex-start}
.teach-txt{flex:1;font-size:12px;font-weight:700;color:#2a1a00;line-height:1.6}
.teach-txt strong{color:#c87a00;font-weight:900}
.teach-gfx{flex-shrink:0;width:132px;background:#fff;border-radius:10px;border:1.5px solid #f0d080;padding:4px;overflow:hidden}
.teach-formula{background:#fff;border:2px solid #e0a020;border-radius:10px;padding:6px 10px;margin-top:8px;font-size:12px;font-weight:900;color:#6b4200;text-align:center;line-height:1.5}
.teach-step{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:11px;font-weight:700;color:#2a1a00;line-height:1.45}
.teach-num{width:20px;height:20px;min-width:20px;border-radius:50%;background:#e0a020;color:#fff;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-top:1px}

/* XP popup */
.xp-popup{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) translateZ(0);background:rgba(20,20,40,.95);color:#ffd700;font-size:22px;font-weight:900;padding:14px 28px;border-radius:16px;border:2px solid #ffd700;z-index:9000;pointer-events:none;animation:xppop .8s ease forwards;will-change:transform,opacity}
@keyframes xppop{0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}25%{opacity:1;transform:translate(-50%,-55%) scale(1)}75%{opacity:1;transform:translate(-50%,-65%)}100%{opacity:0;transform:translate(-50%,-75%)}}

/* Badge toast */
.badge-toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateZ(0);padding:10px 20px;border-radius:20px;font-weight:900;font-size:14px;z-index:9000;box-shadow:0 6px 28px rgba(0,0,0,.45);animation:toastin .5s ease;white-space:nowrap;color:#fff;border:2px solid rgba(255,255,255,.3);will-change:transform,opacity}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateZ(0) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateZ(0) translateY(0)}}

/* Confetti */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8000;will-change:transform;transform:translateZ(0)}
.cpiec{position:absolute;animation:cfall linear forwards}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── Welcome / Screens ── */
.welcome-wrap,.zc-wrap,.end-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:#1a1a2e}
.zc-wrap{align-items:flex-start}
.welcome-card{background:linear-gradient(160deg,#1a1a3e,#16213e);border:2px solid rgba(255,215,0,.25);border-radius:24px;padding:28px 22px;max-width:440px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.6)}
.welcome-logo{font-size:22px;font-weight:900;color:#ffd700;margin-bottom:4px}
.welcome-sub{font-size:11px;color:#a0c4ff;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
.welcome-pokemon{font-size:64px;line-height:1;margin:10px 0;display:block;animation:bounce 1.4s ease infinite;will-change:transform;transform:translateZ(0)}
@keyframes bounce{0%,100%{transform:translateY(0) translateZ(0)}40%{transform:translateY(-18px) translateZ(0)}60%{transform:translateY(-8px) translateZ(0)}}
.save-box{background:rgba(255,215,0,.07);border:2px solid rgba(255,215,0,.25);border-radius:16px;padding:14px 16px;margin:12px 0;text-align:left}
.save-box-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;color:#a0c4ff;margin-bottom:8px}
.save-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.save-row:last-child{border-bottom:none}
.save-label{font-size:12px;color:rgba(255,255,255,.65);font-weight:700}
.save-value{font-size:13px;color:#ffd700;font-weight:900}
.no-save{color:rgba(255,255,255,.45);font-size:12px;font-weight:700;margin:8px 0 16px}
.autosave-note{font-size:10px;color:rgba(255,255,255,.3);margin-top:14px;font-weight:700}

/* Buttons */
.btn{width:100%;padding:14px;border-radius:14px;border:none;font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;margin-top:8px;-webkit-appearance:none;display:block}
.btn:active{transform:scale(.97)}
.btn-green{background:linear-gradient(135deg,#3daa6e,#22c065);color:#fff}
.btn-red{background:linear-gradient(135deg,#cc2200,#ff4400);color:#fff}
.btn-blue{background:linear-gradient(135deg,#4a8fdf,#1a6fc4);color:#fff}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.2);color:#a0c4ff}

/* Difficulty */
.diff-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}
.diff-btn{padding:14px 6px;border-radius:14px;border:2.5px solid;background:transparent;font-family:inherit;cursor:pointer;text-align:center;-webkit-appearance:none}
.diff-btn:active{transform:scale(.96)}
.diff-btn.sel{border-width:3px}
.diff-icon{font-size:28px;display:block;margin-bottom:4px}
.diff-label{font-size:13px;font-weight:900;display:block;color:#fff}
.diff-sub{font-size:9px;font-weight:700;display:block;margin-top:2px}

/* Zone complete */
.zc-card{background:#16213e;border-radius:20px;padding:20px;max-width:480px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.zc-pokemon{font-size:60px;display:block;text-align:center;animation:bounce 1s ease infinite;will-change:transform;transform:translateZ(0)}
.zc-title{font-size:20px;font-weight:900;color:#ffd700;margin:6px 0 2px;text-align:center}
.zc-sub{font-size:12px;color:#a0c4ff;font-weight:700;text-align:center;margin-bottom:16px}
.zc-rate-box{border-radius:16px;padding:16px;margin-bottom:14px;text-align:center;border:2.5px solid}
.zc-rate-num{font-size:42px;font-weight:900;line-height:1}
.zc-rate-lbl{font-size:12px;font-weight:700;opacity:.8;margin-top:2px}
.zc-bar-bg{height:12px;border-radius:8px;background:rgba(255,255,255,.1);margin:10px 0 0;overflow:hidden}
.zc-bar-fill{height:100%;border-radius:8px}
.zc-badge{border-radius:12px;padding:10px 14px;margin-bottom:14px;text-align:center;font-weight:900;font-size:14px;border:2px solid}
.zc-wrong-box{background:rgba(255,100,100,.06);border:2px solid rgba(255,100,100,.2);border-radius:14px;padding:14px;margin-bottom:14px}
.zc-wrong-title{font-size:12px;font-weight:900;color:#ff9090;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.zc-wrong-item{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid rgba(255,255,255,.07)}
.zc-q{font-size:12px;font-weight:700;color:#e0e8f0;margin-bottom:4px;line-height:1.4}
.zc-ans{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.zc-your{font-size:11px;font-weight:800;color:#ff8080;padding:2px 8px;background:rgba(255,80,80,.12);border-radius:8px}
.zc-correct{font-size:11px;font-weight:800;color:#80ff80;padding:2px 8px;background:rgba(80,255,80,.12);border-radius:8px}
.zc-summary{background:rgba(255,215,0,.06);border:2px solid rgba(255,215,0,.2);border-radius:14px;padding:14px;margin-bottom:14px}
.zc-sum-title{font-size:12px;font-weight:900;color:#ffd700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.zc-sum-txt{font-size:12px;font-weight:700;color:#e0e8f0;line-height:1.6}
.zc-actions{display:flex;flex-direction:column;gap:8px}
.zc-btn{width:100%;padding:14px;border-radius:14px;border:none;font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;-webkit-appearance:none}
.zc-btn:active{transform:scale(.97)}
.zc-token{background:linear-gradient(135deg,#e0a020,#c87a00);color:#fff}
.zc-next{background:linear-gradient(135deg,#cc2200,#ff4400);color:#fff}
.zc-map{background:transparent;border:2px solid rgba(255,255,255,.2);color:#a0c4ff}

/* End screen */
.end-card{background:#fff;border-radius:20px;padding:24px 20px;text-align:center;max-width:440px;width:100%}
.end-pokemon{font-size:80px;line-height:1;margin-bottom:8px;display:block;animation:bounce 1s ease infinite;will-change:transform;transform:translateZ(0)}
.end-title{font-size:26px;font-weight:900;color:#1a2a3a;margin-bottom:4px}
.end-sub{font-size:14px;color:#555;margin-bottom:14px}
.star-row{font-size:32px;margin-bottom:10px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const ZONES=[
  {id:0,name:"Measurement Lab",emoji:"🔬",color:"#3daa6e",bg:"#e6f7ee",text:"#135c34",
   pokemon:"🌱",pkName:"Bulbasaur",pkType:"Grass",typeColor:"#3daa6e"},
  {id:1,name:"Pictograph Park",emoji:"🌳",color:"#f5922f",bg:"#fff3e0",text:"#7a3600",
   pokemon:"🦆",pkName:"Psyduck",pkType:"Water",typeColor:"#4a8fdf"},
  {id:2,name:"Bar Chart City",emoji:"🏙️",color:"#4a8fdf",bg:"#e3f0fb",text:"#1a3f7a",
   pokemon:"⚡",pkName:"Pikachu",pkType:"Electric",typeColor:"#e0c020"},

/* ══ HELPERS ══ */
function el(id){return document.getElementById(id);}
function qs(sel,root){return (root||document).querySelector(sel);}
function ce(tag,attrs,text){
  var e=document.createElement(tag);
  if(attrs){
    var keys=Object.keys(attrs);
    for(var ki=0;ki<keys.length;ki++){
      var k=keys[ki],v=attrs[k];
      if(k==='class'){e.className=v;}
      else if(k==='style'){
        if(typeof v==='object'){var sk=Object.keys(v);for(var si=0;si<sk.length;si++)e.style[sk[si]]=v[sk[si]];}
        else e.setAttribute('style',v);
      }
      else if(k==='onclick'){e.onclick=v;}
      else if(k==='disabled'){if(v)e.disabled=true;}
      else{e.setAttribute(k,v);}
    }
  }
  if(text!=null&&text!==false&&text!==undefined){
    if(typeof text==='string'||typeof text==='number'){e.appendChild(document.createTextNode(String(text)));}
    else if(text&&text.nodeType){e.appendChild(text);}
  }
  return e;
}
function svgEl(tag,attrs,children){
  var e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  if(attrs){var ak=Object.keys(attrs);for(var ai=0;ai<ak.length;ai++)e.setAttribute(ak[ai],String(attrs[ak[ai]]));}
  if(children!=null){
    var arr=Array.isArray(children)?children:[children];
    for(var ci=0;ci<arr.length;ci++){
      var c=arr[ci];
      if(c==null)continue;
      if(typeof c==='string'||typeof c==='number'){e.appendChild(document.createTextNode(String(c)));}
      else if(c.nodeType){e.appendChild(c);}
    }
  }
  return e;
}
function svg(viewBox,w,children){
  const s=svgEl('svg',{viewBox,width:w||'100%',xmlns:'http://www.w3.org/2000/svg'});
  if(children)(Array.isArray(children)?children:[children]).forEach(c=>{if(c)s.appendChild(c);});
  return s;
}

function currentLevels(){return getLevels(S.diff);}
function currentLv(){const L=currentLevels();return L[Math.min(S.level,L.length-1)];}
function currentZone(){return ZONES[currentLv().z]||ZONES[0];}

function getLevelZoneRange(LEVELS,zid){
  const idxs=LEVELS.reduce((a,l,i)=>{if(l.z===zid)a.push(i);return a;},[]);
  return{first:idxs[0]||0,last:idxs[idxs.length-1]||0,count:idxs.length};
}
function isLastInZone(){
  const LEVELS=currentLevels();
  const{last}=getLevelZoneRange(LEVELS,LEVELS[S.level].z);
  return S.level===last;
}

/* ══ DIALOGUE TYPEWRITER ══ */
function typeDialogue(text){
  clearInterval(S.dlgTimer);
  S.dialogueFull=text;S.dialogueText='';
  let i=0;
  S.dlgTimer=setInterval(()=>{
    i++;S.dialogueText=text.slice(0,i);
    const d=qs('.dialogue-txt');if(d)d.textContent=S.dialogueText;
    if(i>=text.length)clearInterval(S.dlgTimer);
  },22);
}

/* ══ FLASH (no fixed overlay, just outline) ══ */
function doFlash(good){
  const bc=qs('.battle-card');if(!bc)return;
  bc.classList.remove('flash-ok','flash-no');
  void bc.offsetWidth;
  bc.classList.add(good?'flash-ok':'flash-no');
  clearTimeout(S.flashTimer);
  S.flashTimer=setTimeout(()=>{if(bc){bc.classList.remove('flash-ok','flash-no');}},550);
}

function renderViz(viz){

      poly('65,8 10,72 120,72','#fff0f2','#e8455a',2),

      t(18,68,'middle',10,'#e8455a',800,'60'),
      t(112,68,'middle',10,'#e8455a',800,'60'),
      t(65,78,'middle',9,'#7a0f1e',900,'60+60+60=180 deg')
    ]);
  }
  if(kind==='triangle_right'){
    return makeSvg('0 0 130 80',[
      poly('15,70 15,10 95,70','#fff0f2','#e8455a',2),
      svgEl('polyline',{'points':'15,58 27,58 27,70','fill':'none','stroke':'#e8455a','stroke-width':1.5}),
      t(15,8,'start',9,'#e8455a',900,'90'),
      t(55,78,'middle',9,'#7a0f1e',900,'Right angle = 90 deg')
    ]);
  }
  if(kind==='fraction_circle'){
    var fc=[];var fcr=28;var fcx=38;var fcy=38;
    for(var fi=0;fi<4;fi++){
      var a1=fi*Math.PI/2-Math.PI/2;var a2=(fi+1)*Math.PI/2-Math.PI/2;
      var fx1=fcx+fcr*Math.cos(a1);var fy1=fcy+fcr*Math.sin(a1);
      var fx2=fcx+fcr*Math.cos(a2);var fy2=fcy+fcr*Math.sin(a2);
      var fd='M'+fcx+','+fcy+' L'+fx1.toFixed(1)+','+fy1.toFixed(1)+' A'+fcr+','+fcr+' 0 0 1 '+fx2.toFixed(1)+','+fy2.toFixed(1)+' Z';
      fc.push(path(fd,fi<3?'#1ab8a0cc':'#e8f0f8','#fff',1.5));
    }
    fc.push(t(38,42,'middle',12,'#0a5446',900,'3/4'));
    fc.push(t(74,22,'start',10,'#1a2a3a',800,'Numerator'));
    fc.push(t(74,34,'start',9,'#555',700,'= shaded parts'));
    fc.push(t(74,48,'start',10,'#1a2a3a',800,'Denominator'));
    fc.push(t(74,60,'start',9,'#555',700,'= total parts'));
    return makeSvg('0 0 130 72',fc);
  }
  if(kind==='fraction_compare'){
    return makeSvg('0 0 130 68',[
      r(5,8,58,20,4,'#5c9ee8cc','#fff',1),
      r(63,8,58,20,4,'#e8f0f8','#aac4da',1),
      t(34,22,'middle',11,'#fff',900,'1/2'),
      r(5,36,87,20,4,'#1ab8a0cc','#fff',1),
      r(92,36,29,20,4,'#e8f0f8','#aac4da',1),
      t(48,50,'middle',11,'#fff',900,'3/4'),
      t(65,66,'middle',9,'#0a5446',900,'3/4 > 1/2')
    ]);
  }
  if(kind==='place_table'){
    var labs2=['Th','H','T','O'];var vals2=[3,4,5,7];var pc2=[];
    for(var pli=0;pli<4;pli++){
      pc2.push(r(4+pli*30,5,28,20,3,'#fffbe6','#e0c060',1.5));
      pc2.push(t(18+pli*30,19,'middle',10,'#6b4200',900,labs2[pli]));
      pc2.push(r(4+pli*30,28,28,22,3,pli===1?'#fff3e0':'#fff','#e0c060',pli===1?2:1));
      pc2.push(t(18+pli*30,43,'middle',14,pli===1?'#e0a020':'#1a2a3a',900,String(vals2[pli])));
    }
    pc2.push(t(65,62,'middle',9,'#6b4200',800,'H column = hundreds'));
    return makeSvg('0 0 130 68',pc2);
  }
  if(kind==='place_round'){
    return makeSvg('0 0 130 68',[
      t(65,18,'middle',15,'#1a2a3a',900,'4 6 8 7'),
      r(70,22,16,16,3,'rgba(232,69,90,.2)','#e8455a',1.5),
      t(78,33,'middle',12,'#e8455a',900,'8'),
      t(65,50,'middle',9,'#333',700,'Tens digit 8 >= 5'),
      t(65,62,'middle',10,'#3daa6e',900,'Round UP to 4700')
    ]);
  }
  // Default fallback
  return makeSvg('0 0 130 60',[
    t(65,28,'middle',28,'#333',400,'?'),
    t(65,50,'middle',10,'#555',700,'Read carefully!')
  ]);
}


/* ══ TEACH PANEL ══ */
function stripAnswer(html){
  // Replace content inside <strong>...</strong> with ? to hide the answer
  return html.replace(/<strong>[^<]*<\/strong>/g,'<strong>?</strong>');
}
function buildTeachPanel(lv,zone){
  const t=lv.teach;if(!t)return null;
  const panel=ce('div',{class:'teach-panel'});
  const hdr=ce('div',{class:'teach-hdr'});
  hdr.appendChild(ce('span',{style:{fontSize:'22px'}},'🦉'));
  const hdrText=ce('div');
  hdrText.appendChild(ce('div',{class:'teach-hdr-text'},"Prof. Oak's Hint"));
  hdrText.appendChild(ce('div',{class:'teach-hdr-sub'},zone.name+' · '+zone.pkType+' TYPE'));
  hdr.appendChild(hdrText);
  panel.appendChild(hdr);
  const body=ce('div',{class:'teach-body'});
  const txt=ce('div',{class:'teach-txt'});
  if(t.steps && t.steps.length>0){
    // Show all steps but hide final answers with ?
    t.steps.forEach(function(s,i){
      const row=ce('div',{class:'teach-step'});
      row.appendChild(ce('div',{class:'teach-num'},String(i+1)));
      const sp=ce('span');
      sp.innerHTML=stripAnswer(s);
      row.appendChild(sp);txt.appendChild(row);
    });
  } else if(t.text){
    const sp=ce('span');
    sp.innerHTML=stripAnswer(t.text);
    txt.appendChild(sp);
  }
  // Formula hidden — would reveal the answer
  // Add a gentle nudge instead
  const nudge=ce('div',{class:'teach-formula'},'Think through the steps — try again! 💪');
  txt.appendChild(nudge);
  body.appendChild(txt);
  const gfxWrap=ce('div',{class:'teach-gfx'});
  const g=teachGraphic(t.graphic||'bar_read');
  if(g)gfxWrap.appendChild(g);
  body.appendChild(gfxWrap);
  panel.appendChild(body);
  return panel;
}

function pickAnswer(i){
  if(S.chosen!==null)return;
  S.chosen=i;
  const LEVELS=currentLevels();
  const lv=LEVELS[Math.min(S.level,LEVELS.length-1)];
  const zone=ZONES[lv.z]||ZONES[0];
  const correct=(i===lv.ans);
  S.zoneAnswers.push({lvIdx:S.level,correct,yourAns:i,lv});

  // Style chosen button
  const btn=el('move-'+i);
  if(btn){btn.className='move-btn '+(correct?'correct':'wrong');}
  // Disable all
  for(let j=0;j<4;j++){const b=el('move-'+j);if(b)b.disabled=true;}

  // Feedback
  const fa=el('feedback-area');
  if(fa){
    fa.innerHTML='';
    if(correct){
      fa.appendChild(ce('div',{class:'fb ok'},'⚡ '+zone.pkName+' — CORRECT! It\'s super effective! 🎉'));
    } else {
      fa.appendChild(ce('div',{class:'fb no'},'💥 Wrong — the attack missed!'));
    }
  }

  if(correct){
    // Attack animation
    const ps=el('sprite-p'),es=el('sprite-e');
    if(ps){ps.className='sprite-p attack';setTimeout(()=>{ps.className='sprite-p';},700);}
    if(es){setTimeout(()=>{es.className='sprite-e hit';},350);}
    setTimeout(()=>{if(es)es.className='sprite-e faint';},750);
    // HP bar
    setTimeout(()=>{const b=el('enemy-hp-bar');if(b)b.style.width='0%';},400);
    // Flash
    doFlash(true);
    // Confetti + XP
    spawnConfetti();
    const gained=Math.floor(Math.random()*20)+15;
    showXP(gained);
    S.xp=(S.xp+gained)%100;
    S.score++;
    S.hp=Math.min(100,S.hp+4);
    const xpBar=el('player-xp-bar');if(xpBar)xpBar.style.width=S.xp+'%';
    const hpBar=el('player-hp-bar');if(hpBar)hpBar.style.width=S.hp+'%';
    typeDialogue('⚡ Super effective! '+zone.pkName+' gained '+gained+' XP!');
    // Show next button
    setTimeout(()=>showNextButton(true),800);
  } else {
    // Flinch
    const ps=el('sprite-p');if(ps){ps.className='sprite-p flinch';setTimeout(()=>{ps.className='sprite-p';},500);}
    doFlash(false);
    S.hp=Math.max(8,S.hp-15);
    const hpBar=el('player-hp-bar');
    if(hpBar){const hpC=S.hp>50?'#22e065':S.hp>25?'#ffcc00':'#ff4444';hpBar.style.width=S.hp+'%';hpBar.style.background=hpC;}
    S.wrongCount++;
    typeDialogue('💥 Not quite! Prof. Oak will explain below!');
    // Show teach panel
    const ta=el('teach-area');
    if(ta){
      while(ta.firstChild)ta.removeChild(ta.firstChild);
      var tp=buildTeachPanel(lv,zone);
      if(tp)ta.appendChild(tp);
    }
    // Show try-again or next
    showNextButton(false);
  }
}

function showNextButton(correct){
  const aa=el('action-area');if(!aa)return;
  // Remove old next btn if any
  const old=aa.querySelector('.next-btn');if(old)old.remove();
  const LEVELS=currentLevels();
  const lv=LEVELS[Math.min(S.level,LEVELS.length-1)];
  const canRetry=!correct&&S.wrongCount<2;
  const btn=ce('button',{class:'next-btn',onclick:()=>{
    if(canRetry){
      // Reset for retry
      S.chosen=null;
      for(let j=0;j<4;j++){const b=el('move-'+j);if(b){b.disabled=false;b.className='move-btn';b.style.borderColor=['#4a8fdf','#3daa6e','#e8455a','#9b45e8'][j]+'55';}}
      const fa=el('feedback-area');if(fa)fa.innerHTML='';
      const ta=el('teach-area');if(ta){while(ta.firstChild)ta.removeChild(ta.firstChild);}
      const old2=aa.querySelector('.next-btn');if(old2)old2.remove();
      typeDialogue('Try a different move, Trainer!');
    } else {
      advanceLevel();
    }
  }},canRetry?'🔄 Try Again':'▶ Next Battle!');
  // Insert before back button
  const back=aa.querySelector('.back-btn');
  if(back)aa.insertBefore(btn,back);
  else aa.appendChild(btn);
}

function advanceLevel(){
  const LEVELS=currentLevels();
  const lv=LEVELS[Math.min(S.level,LEVELS.length-1)];
  const nx=S.level+1;
  // Check badge
  const nb=BADGES.find(b=>b.at===nx&&!S.earnedBadges.find(x=>x.at===b.at));
  if(nb){S.earnedBadges.push(nb);showBadgeToast(nb);}
  // Check zone end
  const{last}=getLevelZoneRange(LEVELS,lv.z);
  if(S.level===last){
    S.completedZoneId=lv.z;
    S.level=nx;S.chosen=null;S.wrongCount=0;save();
    renderZoneComplete();
    return;
  }
  if(nx>=LEVELS.length){clearSave();renderEnd();return;}
  S.level=nx;S.chosen=null;S.wrongCount=0;save();renderBattle();
}

/* ══ ZONE COMPLETE ══ */
function renderZoneComplete(){
  const root=el('root');root.innerHTML='';
  const cZone=ZONES[S.completedZoneId]||ZONES[0];
  const zAnswers=S.zoneAnswers.filter(a=>a.lv&&a.lv.z===S.completedZoneId);
  const correctCount=zAnswers.filter(a=>a.correct).length;
  const total=Math.max(zAnswers.length,1);
  const rate=Math.round((correctCount/total)*100);
  const wrongAnswers=zAnswers.filter(a=>!a.correct);
  const rateColor=rate>=90?'#22c065':rate>=70?'#f5922f':'#e8455a';
  const rateMsg=rate===100?'🏆 Perfect!':rate>=80?'⭐ Great work!':rate>=60?'👍 Good effort!':'💪 Keep practising!';
  const zoneBadge=S.earnedBadges.find(b=>b.at===S.level||b.at===S.level-1);

  const wrap=ce('div',{class:'screen active',style:{padding:'10px 0'}});
  const card=ce('div',{class:'zc-card'});

  card.appendChild(ce('span',{class:'zc-pokemon'},cZone.pokemon));
  card.appendChild(ce('div',{class:'zc-title'},cZone.emoji+' '+cZone.name+' Complete!'));
  card.appendChild(ce('div',{class:'zc-sub'},cZone.pkName+' says: '+rateMsg));

  // Rate box
  const rb=ce('div',{class:'zc-rate-box',style:{background:rateColor+'18',borderColor:rateColor}});
  rb.appendChild(ce('div',{class:'zc-rate-num',style:{color:rateColor}},rate+'%'));
  rb.appendChild(ce('div',{class:'zc-rate-lbl',style:{color:rateColor}},correctCount+' / '+total+' correct'));
  const barBg=ce('div',{class:'zc-bar-bg'});
  barBg.appendChild(ce('div',{class:'zc-bar-fill',style:{width:rate+'%',background:rateColor}}));
  rb.appendChild(barBg);card.appendChild(rb);

  // Badge
  if(zoneBadge){
    card.appendChild(ce('div',{class:'zc-badge',style:{background:zoneBadge.color+'18',borderColor:zoneBadge.color,color:zoneBadge.color}},'🏅 '+zoneBadge.label+' Unlocked!'));
  }

  // Wrong questions
  if(wrongAnswers.length>0){
    const wb=ce('div',{class:'zc-wrong-box'});
    wb.appendChild(ce('div',{class:'zc-wrong-title'},'❌ Review ('+wrongAnswers.length+' questions)'));
    wrongAnswers.slice(0,5).forEach(a=>{
      const item=ce('div',{class:'zc-wrong-item'});
      item.appendChild(ce('div',{class:'zc-q'},'Q: '+(a.lv.q.length>75?a.lv.q.slice(0,75)+'…':a.lv.q)));
      const ans=ce('div',{class:'zc-ans'});
      ans.appendChild(ce('span',{class:'zc-your'},'Your: '+(a.lv.opts[a.yourAns]||'?')));
      ans.appendChild(ce('span',{class:'zc-correct'},'Correct: '+(a.lv.opts[a.lv.ans]||'?')));
      item.appendChild(ans);wb.appendChild(item);
    });
    if(wrongAnswers.length>5)wb.appendChild(ce('div',{style:{fontSize:'10px',color:'rgba(255,255,255,.35)',marginTop:'5px',fontWeight:700}},'...and '+(wrongAnswers.length-5)+' more'));
    card.appendChild(wb);
  }

  // Summary
  const sm=ce('div',{class:'zc-summary'});
  sm.appendChild(ce('div',{class:'zc-sum-title'},'🦉 Prof. Oak\'s Summary'));
  sm.appendChild(ce('div',{class:'zc-sum-txt'},
    rate===100?'Perfect! You mastered '+cZone.name+'!':
    'You got '+correctCount+'/'+total+' correct in '+cZone.name+'. '+
    (wrongAnswers.length>0?'Review: '+wrongAnswers.slice(0,2).map(a=>(a.lv.opts[a.lv.ans]||'')).join(', '):'')
  ));
  card.appendChild(sm);

  // Actions
  const LEVELS=currentLevels();
  const ac=ce('div',{class:'zc-actions'});
  ac.appendChild(ce('button',{class:'zc-btn zc-token',onclick:function(){
    var diffLabel=DIFF_LABELS[S.diff]||S.diff;
    var msg='Hey Daddy, I have finished '+cZone.name+' - '+diffLabel+' Level with Score: '+correctCount+'/'+total+' Correct Rate - '+rate+'%. Can I please collect token?';
    var url='https://wa.me/85251126007?text='+encodeURIComponent(msg);
    window.open(url,'_blank');
  }},'🪙 Collect Token from Daddy!'));
  if(S.level<LEVELS.length){
    ac.appendChild(ce('button',{class:'zc-btn zc-next',onclick:()=>{S.zoneAnswers=[];renderBattle();}},'▶ Continue to Next Zone'));
  } else {
    ac.appendChild(ce('button',{class:'zc-btn zc-next',onclick:()=>{clearSave();renderEnd();}},'🏆 Finish Game!'));
  }
  ac.appendChild(ce('button',{class:'zc-btn zc-map',onclick:()=>{S.zoneAnswers=[];renderMap();}},'🗺️ Back to Map'));
  card.appendChild(ac);
  wrap.appendChild(card);root.appendChild(wrap);

  // Confetti for good performance
  if(rate>=70)spawnConfetti();
}

/* ══ END SCREEN ══ */
function renderEnd(){
  const root=el('root');root.innerHTML='';
  const LEVELS=currentLevels();
  const pct=Math.round((S.score/LEVELS.length)*100);
  const stars=pct>=90?3:pct>=70?2:1;
  const wrap=ce('div',{class:'screen active'});
  const card=ce('div',{class:'end-card'});
  card.appendChild(ce('span',{class:'end-pokemon'},pct>=80?'🏆':pct>=60?'⚡':'🌱'));
  card.appendChild(ce('div',{class:'star-row'},'⭐'.repeat(stars)+'☆'.repeat(3-stars)));
  card.appendChild(ce('div',{class:'end-title'},'Case Closed! 🕵️'));
  card.appendChild(ce('div',{class:'end-sub'},DIFF_LABELS[S.diff]+' · '+S.score+'/100 ('+pct+'%)'));
  const bSection=ce('div',{style:{margin:'12px 0',padding:'10px',background:'#f7fafd',borderRadius:10}});
  bSection.appendChild(ce('div',{style:{fontWeight:900,fontSize:12,color:'#1a2a3a',marginBottom:'7px'}},'🏅 Pokémon Badges'));
  const bg=ce('div',{class:'badge-grid'});
  BADGES.forEach(b=>{
    const earned=S.earnedBadges.some(x=>x.at===b.at);
    bg.appendChild(ce('div',{class:'badge-item',style:earned?{background:b.color+'18',borderColor:b.color,color:b.color}:{opacity:.2,borderColor:'#ccc',color:'#aaa'}},b.label));
  });
  bSection.appendChild(bg);card.appendChild(bSection);
  card.appendChild(ce('div',{style:{fontSize:12,color:'#555',marginBottom:'14px'}},
    pct===100?'🎊 PERFECT! Master of all zones!':pct>=80?'🌟 Ash would be proud!':pct>=60?'👍 Great trainer!':'💪 Every master starts here!'));
  card.appendChild(ce('button',{class:'btn btn-red',onclick:()=>renderSelectDiff()},'🔄 Play Again'));
  wrap.appendChild(card);root.appendChild(wrap);
  spawnConfetti();
}
/* ══ INIT ══ */
(function() {
  try {
    renderWelcome();
  } catch(e) {
    var d = document.getElementById('root');
    d.style.cssText = 'min-height:100vh;background:#1a1a2e;display:flex;align-items:center;justify-content:center;padding:20px';
    var box = document.createElement('div');
    box.style.cssText = 'background:#16213e;border-radius:20px;padding:28px;text-align:center;max-width:360px;width:100%;border:2px solid rgba(255,100,100,.3)';
    box.innerHTML = '<div style="font-size:40px;margin-bottom:12px">X</div>' +
      '<div style="color:#ffd700;font-weight:900;font-size:18px;margin-bottom:8px;font-family:Arial,sans-serif">Game Error</div>' +
      '<div style="color:#a0c4ff;font-size:13px;margin-bottom:20px;font-family:Arial,sans-serif">' + (e.message || String(e)) + '</div>';
    var btn = document.createElement('button');
    btn.textContent = 'Restart Game';
    btn.style.cssText = 'background:#cc2200;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif';
    btn.onclick = function() { try{localStorage.removeItem('hkdd_v4');}catch(ex){} location.reload(); };
    box.appendChild(btn);
    d.appendChild(box);
  }
})();
</script>
